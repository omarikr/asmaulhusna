<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asma Ul Husna Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #fff;
            --accent: #d4af37; /* Gold accent */
            --bg-overlay: rgba(0, 0, 0, 0.5);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Outfit', sans-serif;
            background: #000;
            color: var(--primary);
            overflow: hidden;
        }

        /* Landing Page Section */
        .landing {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: url('asmaulhusna.jpg') no-repeat center center;
            background-size: cover;
            z-index: 100;
            transition: opacity 1s ease, visibility 1s;
        }

        .landing::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.7) 100%);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            max-width: 700px;
            padding: 40px;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .experience-tag {
            font-weight: 400;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -2px;
            line-height: 1.1;
        }

        .loop-tag {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--accent);
            margin-bottom: 30px;
            display: block;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
        }

        .btn-start {
            padding: 18px 48px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .btn-start:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            color: var(--accent);
        }

        /* Video Player Container */
        .player-container {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease;
        }

        .player-container.active {
            opacity: 1;
            visibility: visible;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Controls Overlay */
        .controls {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 60%, rgba(0, 0, 0, 0.8));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 60px 40px;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 60;
            user-select: none;
            pointer-events: none;
        }

        .controls.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            pointer-events: auto;
            border-radius: 50%;
        }

        .control-btn:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.9);
        }

        .control-btn:hover {
            transform: scale(1.2);
            color: var(--accent);
        }

        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        input[type="range"] {
            width: 100px;
            height: 4px;
            appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .fullscreen-btn {
            margin-left: auto;
        }

        /* Exit Button */
        .exit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 70;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            font-family: inherit;
        }

        .exit-btn:hover {
            background: rgba(255,0,0,0.5);
            transform: rotate(90deg);
        }
        @media (max-width: 600px) {
            .content { padding: 20px; }
            h1 { font-size: 3.5rem; }
            .loop-tag { font-size: 1.4rem; }
            p { font-size: 1.1rem; margin-bottom: 30px; }
            .btn-start { width: 100%; justify-content: center; padding: 20px 30px; font-size: 1.2rem; }
            .btn-group { flex-direction: column; width: 100%; gap: 15px; }
            .controls { padding: 40px 20px; background: linear-gradient(transparent 40%, rgba(0, 0, 0, 0.9)); }
            .controls-row { gap: 10px; flex-wrap: wrap; }
            .control-btn { font-size: 2.2rem; width: 70px; height: 70px; }
            input[type="range"] { width: 120px; height: 10px; }
            .volume-wrap { width: 100%; justify-content: center; margin-top: 20px; }
        }

        /* Loading Spinner */
        .fa-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Landing Page -->
    <section class="landing" id="landing">
        <div class="content">
            <div class="experience-tag">Experience</div>
            <h1>Asma Ul Husna</h1>
            <span class="loop-tag">On Loop</span>
            <p>This website is made for relaxing and listening to 99 names of Allah without limits, ads. It will play with adjustable volume and on loop. You can close it any time or even open it on full screen for a better experience.</p>
            <div class="btn-group" style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                <button class="btn-start" id="start-btn" onclick="startExperience()">
                    <i class="fas fa-play" id="start-icon"></i> <span id="start-text">Get Started</span>
                </button>
                <a href="https://github.com/omarikr/asmaulhusna" target="_blank" class="btn-start" style="background: rgba(255, 255, 255, 0.05);">
                    <i class="fab fa-github"></i> Source
                </a>
            </div>
        </div>
    </section>

    <!-- Player Page -->
    <section class="player-container" id="player-container">
        <button class="exit-btn" onclick="stopExperience()">
            <i class="fas fa-times"></i>
        </button>
        
        <video id="asma-video" loop playsinline preload="auto">
            <source src="asmaulhusna.mp4" type="video/mp4">
            <source src="https://videotourl.com/videos/1776615984336-b74d9769-c48c-4f5c-8bb0-2cf379ec703c.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <div class="controls" id="controls">
            <div class="controls-row">
                <button class="control-btn" onclick="event.stopPropagation(); seek(-5)" title="Back 5s">
                    <i class="fas fa-backward"></i>
                </button>
                
                <button class="control-btn" id="play-pause" onclick="event.stopPropagation(); togglePlay()" title="Play/Pause">
                    <i class="fas fa-pause"></i>
                </button>

                <button class="control-btn" onclick="event.stopPropagation(); seek(5)" title="Forward 5s">
                    <i class="fas fa-forward"></i>
                </button>

                <button class="control-btn" onclick="event.stopPropagation(); restartVideo()" title="Replay">
                    <i class="fas fa-redo"></i>
                </button>
                
                <div class="volume-wrap" onclick="event.stopPropagation()">
                    <i class="fas fa-volume-up" style="font-size: 1rem; opacity: 0.7;"></i>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" oninput="changeVolume(this.value)">
                </div>

                <button class="control-btn screen-toggle" id="fullscreen-btn" onclick="event.stopPropagation(); toggleFullscreen()" title="Toggle Fullscreen">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </section>

    <script>
        const landing = document.getElementById('landing');
        const playerContainer = document.getElementById('player-container');
        const video = document.getElementById('asma-video');
        const controls = document.getElementById('controls');
        const playPauseBtn = document.getElementById('play-pause');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        let controlTimeout;
        let userPaused = true;
        let audioCtx;

        function startSilentAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const buffer = audioCtx.createBuffer(1, 1, 22050);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                source.connect(audioCtx.destination);
                source.start();
            } catch (e) {
                console.log("Silent audio failed");
            }
        }

        // Initialize Media Session metadata
        function initMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: 'Asma Ul Husna',
                    artist: 'Experience',
                    album: '99 Names of Allah',
                    artwork: [
                        { src: window.location.origin + '/asmaulhusna.jpg', sizes: '512x512', type: 'image/jpeg' }
                    ]
                });

                const actionHandlers = [
                    ['play', () => { userPaused = false; video.play(); }],
                    ['pause', () => { userPaused = true; video.pause(); }],
                    ['seekbackward', () => seek(-5)],
                    ['seekforward', () => seek(5)],
                    ['previoustrack', () => seek(-10)],
                    ['nexttrack', () => seek(10)],
                    ['stop', () => { userPaused = true; stopExperience(); }]
                ];

                for (const [action, handler] of actionHandlers) {
                    try {
                        navigator.mediaSession.setActionHandler(action, handler);
                    } catch (error) {
                        console.log(`The media session action "${action}" is not supported.`);
                    }
                }
            }
        }

        function startExperience() {
            const btn = document.getElementById('start-btn');
            const icon = document.getElementById('start-icon');
            const text = document.getElementById('start-text');
            
            // Show loading state
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.8';
            icon.className = 'fas fa-spinner fa-spin';
            text.innerText = 'Buffering...';

            function proceed() {
                landing.style.opacity = '0';
                setTimeout(() => {
                    landing.style.display = 'none';
                    playerContainer.classList.add('active');
                    initMediaSession();
                    startSilentAudio();
                    userPaused = false;
                    video.play().catch(e => console.log("Auto-play blocked"));
                    showControls(); 
                }, 1000);
            }

            // Check if already loaded enough
            if (video.readyState >= 3) { // HAVE_FUTURE_DATA or HAVE_ENOUGH_DATA
                setTimeout(proceed, 800); // Small delay for visual feedback
            } else {
                // Wait for the browser to confirm it can play through
                video.addEventListener('canplaythrough', proceed, { once: true });
                
                // Fallback: If it takes more than 10s, proceed anyway
                // (better to have some lag than be stuck forever on slow networks)
                setTimeout(() => {
                    if (landing.style.display !== 'none') {
                        proceed();
                    }
                }, 10000);
            }
        }

        function stopExperience() {
            video.pause();
            playerContainer.classList.remove('active');
            landing.style.display = 'flex';
            setTimeout(() => {
                landing.style.opacity = '1';
            }, 50);
        }

        function togglePlay() {
            if (video.paused) {
                userPaused = false;
                video.play();
            } else {
                userPaused = true;
                video.pause();
            }
        }

        function changeVolume(val) {
            video.volume = val;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                const elem = playerContainer;
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        }

        // Show controls on move/touch
        playerContainer.addEventListener('click', (e) => {
            if (!e.target.closest('button') && !e.target.closest('input')) {
                togglePlay();
                showControls();
            }
        });

        function seek(seconds) {
            video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + seconds));
            showControls();
        }

        function restartVideo() {
            video.currentTime = 0;
            video.play();
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            showControls();
        }

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if (!playerContainer.classList.contains('active')) return;

            switch(e.code) {
                case 'Space':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowLeft':
                    seek(-5);
                    break;
                case 'ArrowRight':
                    seek(5);
                    break;
                case 'KeyR':
                    restartVideo();
                    break;
                case 'KeyF':
                    toggleFullscreen();
                    break;
            }
        });

        function showControls() {
            if (playerContainer.classList.contains('active')) {
                controls.classList.add('visible');
                clearTimeout(controlTimeout);
                controlTimeout = setTimeout(() => {
                    controls.classList.remove('visible');
                }, 5000);
            }
        }

        document.addEventListener('mousemove', showControls);
        document.addEventListener('touchstart', showControls, {passive: true});

        // Media Session & Video Event Listeners
        video.addEventListener('play', () => {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = "playing";
            }
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        });

        video.addEventListener('pause', () => {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = "paused";
            }
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            
            // Background Playback Keep-Alive logic
            // If the video was paused by the system (e.g., locking screen) and not by the user
            if (document.hidden && !userPaused) {
                setTimeout(() => {
                    video.play().catch(e => {
                        console.log("Background resume blocked by browser policy");
                        // The media session notification is still there for the user to tap play
                    });
                }, 100);
            }
        });

        video.addEventListener('timeupdate', () => {
            if ('mediaSession' in navigator && video.duration) {
                navigator.mediaSession.setPositionState({
                    duration: video.duration,
                    playbackRate: video.playbackRate,
                    position: video.currentTime
                });
            }
        });

        // Try to keep playing in background for some mobile browsers
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && !video.paused) {
                // Some browsers pause automatically, we give it a nudge if needed
                // But usually Media Session is enough to show the play button on lock screen
            }
        });

        // Loop handling
        video.onended = () => {
            video.currentTime = 0;
            video.play();
        };

        // Screen change listeners
        const fsEvents = ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'];
        fsEvents.forEach(evt => document.addEventListener(evt, () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        }));
    </script>
</body>
</html>
