<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asma Ul Husna Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #fff;
            --accent: #d4af37; /* Gold accent */
            --bg-overlay: rgba(0, 0, 0, 0.5);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Outfit', sans-serif;
            background: #000;
            color: var(--primary);
            overflow: hidden;
        }

        /* Landing Page Section */
        .landing {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #000;
            z-index: 100;
            transition: opacity 1s ease, visibility 1s;
            overflow: hidden;
        }

        .bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 0;
            opacity: 0.6;
        }

        .landing::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            max-width: 700px;
            padding: 40px;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .experience-tag {
            font-weight: 400;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -2px;
            line-height: 1.1;
        }

        .loop-tag {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--accent);
            margin-bottom: 30px;
            display: block;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
        }

        .btn-start {
            padding: 18px 48px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .btn-start:hover {
            background: #fff;
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        /* Video Player Container */
        .player-container {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease;
        }

        .player-container.active {
            opacity: 1;
            visibility: visible;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Controls Overlay */
        .controls {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 70%, rgba(0,0,0,0.6));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 60;
        }

        .controls.visible {
            opacity: 1;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            transform: scale(1.2);
            color: var(--accent);
        }

        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        input[type="range"] {
            width: 100px;
            height: 4px;
            appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .fullscreen-btn {
            margin-left: auto;
        }

        /* Exit Button */
        .exit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 70;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .exit-btn:hover {
            background: rgba(255,0,0,0.5);
            transform: rotate(90deg);
        }
        @media (max-width: 600px) {
            .content { padding: 20px; }
            h1 { font-size: 3rem; }
            .loop-tag { font-size: 1.2rem; }
            p { font-size: 1rem; margin-bottom: 30px; }
            .btn-start { width: 100%; justify-content: center; padding: 15px 30px; font-size: 1rem; }
            .btn-group { flex-direction: column; width: 100%; }
            .controls { padding: 20px; }
            .controls-row { gap: 15px; }
            input[type="range"] { width: 80px; }
        }
    </style>
</head>
<body>

    <!-- Landing Page -->
    <section class="landing" id="landing">
        <video class="bg-video" autoplay muted loop playsinline>
            <source src="https://videotourl.com/videos/1776615984336-b74d9769-c48c-4f5c-8bb0-2cf379ec703c.mp4" type="video/mp4">
        </video>
        <div class="content">
            <div class="experience-tag">Experience</div>
            <h1>Asma Ul Husna</h1>
            <span class="loop-tag">On Loop</span>
            <p>This website is made for relaxing and listening to 99 names of Allah without limits, ads. It will play with adjustable volume and on loop. You can close it any time or even open it on full screen for a better experience.</p>
            <div class="btn-group" style="display: flex; gap: 15px; justify-content: center;">
                <button class="btn-start" onclick="startExperience()">
                    <i class="fas fa-play"></i> Get Started
                </button>
                <a href="https://github.com/omarikr/asmaulhusna" target="_blank" class="btn-start" style="text-decoration: none; background: rgba(255, 255, 255, 0.05);">
                    <i class="fab fa-github"></i> Source
                </a>
            </div>
        </div>
    </section>

    <!-- Player Page -->
    <section class="player-container" id="player-container">
        <button class="exit-btn" onclick="stopExperience()">
            <i class="fas fa-times"></i>
        </button>
        
        <video id="asma-video" loop playsinline>
            <source src="asmaulhusna.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <div class="controls" id="controls">
            <div class="controls-row">
                <button class="control-btn" id="play-pause" onclick="togglePlay()">
                    <i class="fas fa-pause"></i>
                </button>
                
                <div class="volume-wrap">
                    <i class="fas fa-volume-up" style="font-size: 1rem; opacity: 0.7;"></i>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" oninput="changeVolume(this.value)">
                </div>

                <button class="control-btn screen-toggle" id="fullscreen-btn" onclick="toggleFullscreen()">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </section>

    <script>
        const landing = document.getElementById('landing');
        const playerContainer = document.getElementById('player-container');
        const video = document.getElementById('asma-video');
        const controls = document.getElementById('controls');
        const playPauseBtn = document.getElementById('play-pause');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        let controlTimeout;

        function startExperience() {
            landing.style.opacity = '0';
            setTimeout(() => {
                landing.style.display = 'none';
                playerContainer.classList.add('active');
                video.play();
            }, 1000);
        }

        function stopExperience() {
            video.pause();
            playerContainer.classList.remove('active');
            landing.style.display = 'flex';
            setTimeout(() => {
                landing.style.opacity = '1';
            }, 50);
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                video.pause();
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
        }

        function changeVolume(val) {
            video.volume = val;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                const elem = playerContainer;
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        }

        // Show controls on move/touch
        function showControls() {
            if (playerContainer.classList.contains('active')) {
                controls.classList.add('visible');
                clearTimeout(controlTimeout);
                controlTimeout = setTimeout(() => {
                    controls.classList.remove('visible');
                }, 3000);
            }
        }

        document.addEventListener('mousemove', showControls);
        document.addEventListener('touchstart', showControls, {passive: true});

        // Loop handling
        video.onended = () => {
            video.currentTime = 0;
            video.play();
        };

        // Screen change listeners
        const fsEvents = ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'];
        fsEvents.forEach(evt => document.addEventListener(evt, () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            }
        }));
    </script>
</body>
</html>
